name: MagicPaw Capt Stats

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *"

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Get Fletcher stats
        run: node bot.js

      - name: Save stats.json
        run: |
          git config user.name "MagicPaw Stats Bot"
          git config user.email "actions@github.com"
          git add stats.json
          git diff --cached --quiet || git commit -m "Update MagicPaw stats"
          git push
